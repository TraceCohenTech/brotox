<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#3b82f6" opacity="0.1"/>
  <circle cx="100" cy="530" r="150" fill="#8b5cf6" opacity="0.1"/>

  <!-- Logo -->
  <text x="100" y="180" font-family="Arial Black, Helvetica, sans-serif" font-size="48" font-weight="900" fill="white">BROTOX<tspan fill="#3b82f6">.</tspan></text>

  <!-- Main headline -->
  <text x="100" y="300" font-family="Arial Black, Helvetica, sans-serif" font-size="72" font-weight="900" fill="white">BOTOX FOR MEN.</text>
  <text x="100" y="390" font-family="Arial Black, Helvetica, sans-serif" font-size="72" font-weight="900" fill="url(#textGradient)">DONE RIGHT.</text>

  <!-- Subheadline -->
  <text x="100" y="480" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#9ca3af">Education first. Trusted local recommendations.</text>

  <!-- Trust badges -->
  <rect x="100" y="520" width="160" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
  <text x="130" y="547" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#22c55e">FDA Approved</text>

  <rect x="280" y="520" width="200" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
  <text x="310" y="547" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#3b82f6">7M+ Procedures/Year</text>

  <!-- URL -->
  <text x="1100" y="580" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#6b7280" text-anchor="end">brotoxofficial.com</text>
</svg>
